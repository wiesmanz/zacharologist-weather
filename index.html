<!DOCTYPE html>
<html>
<head>
<title>Zacharologist Wx Page</title>
<style>
body {
  margin:0;
  font-family:Arial,sans-serif;
  background:#e5e5e5;
}

header {
  background:#d9d9d9;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1 {
  margin:0;
  font-size:48px;
  font-weight:bold;
}

nav a {
  margin-left:20px;
  text-decoration:none;
  color:black;
  font-size:20px;
}

.hero {
  position: relative;
  height: 800px;
}

.hero img {
  width: 100%;
  height: 900px;
  object-fit: cover;
}

.overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: white;
  width: 80%;
}

.overlay h2 {
  font-size: 60px;
  text-shadow: 2px 2px 8px black;
}

.overlay p {
  font-size: 28px;
  text-shadow: 2px 2px 8px black;
}

.button {
  display: inline-block;
  margin-top: 20px;
  padding: 15px 40px;
  background: black;
  color: white;
  text-decoration: none;
  font-weight: bold;
}
}
</style>
</head>

<body>

<header>
<h1>Zacharologist Wx Page</h1>
<nav>
<a href="#">Home</a>
<a href="#">Wx Updates</a>
<a href="#">Maps & Models</a>
</nav>
</header>

 <div class="hero">
  <img src="hero.jpg" alt="Weather collage">

  <div class="overlay">
    <h2>Access To My Weather World!</h2>
    <p>Storms, forecasts, sky, and live weather tools.</p>
    <a class="button" href="#">GET STARTED</a>
  </div>
</div>
</html>
